name: Update Gray Zone Vessel Data

on:
  schedule:
    # 每天 UTC 00:00, 12:00 執行（台灣時間 08:00, 20:00）— GFW/軍演等低頻資料
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # 允許手動觸發

concurrency:
  group: data-pipeline
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests pandas numpy websockets scipy statsmodels pysocks beautifulsoup4
          
      - name: Restore large data cache
        uses: actions/cache/restore@v4
        with:
          path: |
            data/vessel_profiles.json
            data/ais_track_commercial.json
          key: large-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            large-data-${{ runner.os }}-

      - name: Fetch AIS data via SOCKS5 proxy
        env:
          USE_PROXY: "true"
          POOL: ${{ secrets.POOL }}
        run: |
          python src/fetch_ais_data.py
        continue-on-error: true
          
      - name: Fetch GFW data and analyze
        env:
          GFW_API_TOKEN: ${{ secrets.GFW_API_TOKEN }}
        run: |
          python src/fetch_gfw_data.py
        continue-on-error: true

      - name: Analyze suspicious vessels (CSIS methodology)
        run: |
          python src/analyze_suspicious.py
        continue-on-error: true

      - name: Exercise prediction analysis
        run: |
          python src/exercise_prediction.py
        continue-on-error: true

      - name: Fetch SCFI (Shanghai Containerized Freight Index)
        run: |
          python src/fetch_scfi_data.py
        continue-on-error: true

      - name: Analyze SCFI vs vessel traffic correlation
        run: |
          python src/analyze_scfi_correlation.py
        continue-on-error: true

      - name: Fetch weekly dark vessel animation data
        env:
          GFW_API_TOKEN: ${{ secrets.GFW_API_TOKEN }}
        run: |
          python src/fetch_weekly_dark_vessels.py
        continue-on-error: true

      - name: Detect ship-to-ship transfers
        run: |
          python src/detect_ship_transfers.py
        continue-on-error: true

      - name: Fetch submarine cable fault status from MODA
        run: |
          python src/fetch_cable_status.py
        continue-on-error: true

      - name: Generate dashboard data
        run: |
          python src/generate_dashboard.py

      - name: Generate China gov/special-interest vessel track map (once daily, 00 UTC)
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "00" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pip install matplotlib
            sudo apt-get update -qq && sudo apt-get install -y -qq fonts-wqy-zenhei
            python src/plot_gov_vessel_tracks.py
          else
            echo "Skip gov vessel track map — runs once daily at 00 UTC (current hour=$HOUR)"
          fi
        continue-on-error: true

      - name: Save large data cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data/vessel_profiles.json
            data/ais_track_commercial.json
          key: large-data-${{ runner.os }}-${{ github.run_id }}

      # 驗證關鍵輸出檔；失敗的檔案以 --restore 還原上次好版本再 commit，
      # 並於最後一步讓整個 job 顯示失敗（取代原 inline VESSEL_COUNT 守衛）
      - name: Validate pipeline outputs
        id: validate
        run: python src/validate_outputs.py --restore
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "🛰️ Update vessel data $(date +'%Y-%m-%d %H:%M') UTC"
          # 拉取遠端最新，自動產生的 data 檔衝突時以本地為主
          git pull --rebase -X theirs origin main || {
            echo "⚠️ Rebase 失敗，改用 merge 策略"
            git rebase --abort
            git pull -X ours origin main
          }
          git push

      - name: Fail if validation failed
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::管線輸出驗證失敗 — 詳見 Validate pipeline outputs 步驟。壞檔已還原為上次好版本後才 commit。"
          exit 1
          
  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # 確保取得最新的 commit

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './docs'
          overwrite: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
