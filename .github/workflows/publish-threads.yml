name: Publish Daily Summary to Threads

on:
  schedule:
    # 每天 UTC 00:30（台灣時間 08:30）— 在 update-data 完成後
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Report type (daily or weekly)'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
      dry_run:
        description: 'Dry run (preview only)'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests matplotlib

      - name: Determine report mode
        id: mode
        run: |
          # Weekly report on Mondays, daily otherwise
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            DOW=$(date -u +%u)
            if [ "$DOW" = "1" ]; then
              echo "mode=weekly" >> $GITHUB_OUTPUT
            else
              echo "mode=daily" >> $GITHUB_OUTPUT
            fi
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate and publish summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_APP_SECRET: ${{ secrets.THREADS_APP_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python src/publish_threads.py $ARGS
