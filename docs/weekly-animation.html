    <style>

<div class="credit">deck.gl TripsLayer | Taiwan Gray Zone Monitor</div>

<script>
// =========================================================================
// Province detection
// =========================================================================
const PROVINCE_PATTERNS = {
    fujian:    { patterns: [/^MIN/i, /^闽/i, /^閩/i], color: [255, 99, 71] },
    zhejiang:  { patterns: [/^ZHE/i, /^浙/i],         color: [65, 105, 225] },
    guangdong: { patterns: [/^YUE/i, /^粤/i, /^粵/i], color: [255, 165, 0] },
    shandong:  { patterns: [/^LU\s?YU/i, /^鲁/i, /^魯/i], color: [50, 205, 50] },
    hainan:    { patterns: [/^QIONG/i, /^琼/i, /^瓊/i], color: [255, 105, 180] },
    jiangsu:   { patterns: [/^SU\s?YU/i, /^苏/i, /^蘇/i], color: [0, 206, 209] },
    guangxi:   { patterns: [/^GUI/i, /^桂/i],         color: [218, 165, 32] },
};

const TYPE_COLORS = {
    fishing: [0, 255, 136],
    cargo:   [0, 245, 255],
    tanker:  [255, 107, 53],
    lng:     [240, 225, 48],
    other:   [147, 112, 219],
    unknown: [136, 136, 136]
};

function getVesselColor(v) {
    const name = (v.name || '').toUpperCase();
    for (const [, prov] of Object.entries(PROVINCE_PATTERNS)) {
        if (prov.patterns.some(p => p.test(name))) return prov.color;
    }
    return TYPE_COLORS[v.type_name] || TYPE_COLORS.unknown;
}

function isCnFishing(v) {
    const name = (v.name || '').toUpperCase();
    for (const [, prov] of Object.entries(PROVINCE_PATTERNS)) {
        if (prov.patterns.some(p => p.test(name))) return true;
    }
    return /YU[.\s]*\d/i.test(name);
}

// =========================================================================
// State
// =========================================================================
let tripData = [];
let currentTime = 0;
let loopLength = 1000;
let trailLength = 30;
let trailWidth = 4;
let playing = false;
let speed = 0.5;
let deckgl = null;
let filterCN = false;
let timestamps = [];
let globalTMin = 0;
let globalTMax = 0;
let rangeDays = 0;

let allProcessedTrips = [];
let cnProcessedTrips = [];

// =========================================================================
// Interpolation: smooth 30-min gaps into ~5-min segments
// =========================================================================
const INTERP_INTERVAL = 5 * 60 * 1000; // 5 minutes in ms

function interpolatePath(path) {
    if (path.length < 2) return path;
    const result = [path[0]];
    for (let i = 1; i < path.length; i++) {
        const prev = path[i - 1];
        const cur = path[i];
        const dt = cur.timestamp - prev.timestamp;

        if (dt > INTERP_INTERVAL * 1.5) {
            const steps = Math.floor(dt / INTERP_INTERVAL);
            for (let s = 1; s < steps; s++) {
                const t = s / steps;
                result.push({
                    coordinates: [
                        prev.coordinates[0] + (cur.coordinates[0] - prev.coordinates[0]) * t,
                        prev.coordinates[1] + (cur.coordinates[1] - prev.coordinates[1]) * t
                    ],
                    timestamp: prev.timestamp + dt * t
                });
            }
        }
        result.push(cur);
    }
    return result;
}

// =========================================================================
// Data processing
// =========================================================================
function processData(frames) {
    const vesselTracks = {};
    const tsSet = new Set();

    frames.forEach(frame => {
        const ts = new Date(frame.timestamp).getTime();
        tsSet.add(ts);

        (frame.vessels || []).forEach(v => {
            if (!v.lat || !v.lon) return;
            if (!vesselTracks[v.mmsi]) {
                vesselTracks[v.mmsi] = {
                    path: [],
                    color: getVesselColor(v),
                    isCN: isCnFishing(v),
                    name: v.name || v.mmsi,
                    type: v.type_name || 'unknown'
                };
            }
            vesselTracks[v.mmsi].path.push({
                coordinates: [v.lon, v.lat],
                timestamp: ts
            });
        });
    });

    timestamps = Array.from(tsSet).sort((a, b) => a - b);
    globalTMin = timestamps[0];
    globalTMax = timestamps[timestamps.length - 1];

    const trips = [];
    for (const [mmsi, track] of Object.entries(vesselTracks)) {
        if (track.path.length < 2) continue;
        track.path.sort((a, b) => a.timestamp - b.timestamp);

        // Deduplicate consecutive identical positions
        const deduped = [track.path[0]];
        for (let i = 1; i < track.path.length; i++) {
            const prev = deduped[deduped.length - 1];
            const cur = track.path[i];
            if (cur.coordinates[0] !== prev.coordinates[0] ||
                cur.coordinates[1] !== prev.coordinates[1]) {
                deduped.push(cur);
            }
        }
        if (deduped.length < 2) continue;

        // Interpolate for smooth animation
        const smoothPath = interpolatePath(deduped);

        trips.push({
            mmsi, name: track.name, type: track.type,
            isCN: track.isCN, color: track.color,
            path: smoothPath
        });
    }

    allProcessedTrips = trips;
    cnProcessedTrips = trips.filter(t => t.isCN);

    applyRangeFilter();
}

function applyRangeFilter() {
    const tMax = globalTMax;
    const tMin = rangeDays === 0 ? globalTMin : tMax - rangeDays * 86400000;

    loopLength = tMax - tMin;

    const sourceTrips = filterCN ? cnProcessedTrips : allProcessedTrips;
    const filtered = [];
    for (const trip of sourceTrips) {
        const clipped = trip.path.filter(p => p.timestamp >= tMin && p.timestamp <= tMax);
        if (clipped.length < 2) continue;
        filtered.push({
            ...trip,
            path: clipped.map(p => ({
                coordinates: p.coordinates,
                timestamp: p.timestamp - tMin
            }))
        });
    }

    tripData = filtered;
}

// =========================================================================
// deck.gl rendering — 3-layer glow
// =========================================================================
function createDeckLayers() {
    const trailMs = trailLength * 60 * 1000;
    const common = {
        data: tripData,
        getPath: d => d.path.map(p => p.coordinates),
        getTimestamps: d => d.path.map(p => p.timestamp),
        jointRounded: true,
        capRounded: true,
        trailLength: trailMs,
        currentTime: currentTime,
        shadowEnabled: false
    };

    return [
        new deck.TripsLayer({
            ...common, id: 'glow-outer',
            getColor: d => [...d.color, 35],
            opacity: 0.25,
            widthMinPixels: trailWidth * 5,
        }),
        new deck.TripsLayer({
            ...common, id: 'glow-mid',
            getColor: d => [...d.color, 90],
            opacity: 0.45,
            widthMinPixels: trailWidth * 2.5,
        }),
        new deck.TripsLayer({
            ...common, id: 'core',
            getColor: d => [...d.color, 240],
            opacity: 0.9,
            widthMinPixels: trailWidth,
        })
    ];
}

function initDeck() {
    deckgl = new deck.DeckGL({
        container: 'container',
        mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        initialViewState: {
            longitude: 121.0,
            latitude: 24.0,
            zoom: 6.5,
            pitch: 0,
            bearing: 0,
            maxZoom: 14,
            minZoom: 4
        },
        controller: true,
        layers: createDeckLayers(),
        getTooltip: ({object}) => {
            if (!object) return null;
            return {
                html: `<div style="font-size:12px"><b>${object.name}</b><br>MMSI: ${object.mmsi}<br>Type: ${object.type}</div>`,
                style: {
                    background: 'rgba(10,15,28,0.9)',
                    color: '#e8eef7',
                    border: '1px solid rgba(0,245,255,0.3)',
                    borderRadius: '4px',
                    padding: '6px 10px'
                }
            };
        }
    });
}

function updateLayers() {
    if (!deckgl) return;
    deckgl.setProps({ layers: createDeckLayers() });
}

// =========================================================================
// UI: Panel toggle
// =========================================================================
function togglePanel() {
    const panel = document.getElementById('panel');
    const btn = document.getElementById('expandBtn');
    panel.classList.toggle('open');
    btn.classList.toggle('open');
}

// =========================================================================
// Time Range
// =========================================================================
function setRange(days) {
    rangeDays = days;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.range-btn[data-range="${days}"]`).classList.add('active');

    applyRangeFilter();
    currentTime = 0;
    syncSliders(0);
    updateTimeDisplay();
    updateLayers();
}

// =========================================================================
// Playback
// =========================================================================
function animate() {
    if (!playing) return;

    // Speed: at 0.5x, full loop ~120s; at 1x, ~60s
    const step = (loopLength / 3600) * speed;
    currentTime += step;

    if (currentTime > loopLength) currentTime = 0;

    syncSliders(Math.round((currentTime / loopLength) * 1000));
    updateTimeDisplay();
    updateLayers();
    requestAnimationFrame(animate);
}

function togglePlay() {
    playing = !playing;
    const btn = document.getElementById('playBtn');
    btn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
    btn.classList.toggle('playing', playing);
    if (playing) requestAnimationFrame(animate);
}

function setSpeed(s) {
    speed = s;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.speed-btn[data-speed="${s}"]`).classList.add('active');
}

function updateTimeDisplay() {
    if (timestamps.length === 0) return;
    const tMin = rangeDays === 0 ? globalTMin : globalTMax - rangeDays * 86400000;
    const actualTime = new Date(tMin + currentTime);
    const dateStr = actualTime.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
    document.getElementById('timeDisplay').textContent = dateStr;

    const trailMs = trailLength * 60000;
    const activeCount = tripData.filter(t => {
        const first = t.path[0].timestamp;
        const last = t.path[t.path.length - 1].timestamp;
        return currentTime >= first && currentTime <= last + trailMs;
    }).length;
    document.getElementById('statLine').textContent =
        activeCount + ' / ' + tripData.length + ' vessels';
}

function updateTrailLength(val) { trailLength = parseInt(val); updateLayers(); }
function updateTrailWidth(val) { trailWidth = parseInt(val); updateLayers(); }

function toggleFilter() {
    filterCN = document.getElementById('filterCN').checked;
    applyRangeFilter();
    updateLayers();
}

// =========================================================================
// Sync both sliders (topbar + panel)
// =========================================================================
function syncSliders(val) {
    document.getElementById('timeSlider').value = val;
    document.getElementById('timeSliderPanel').value = val;
}

function onSliderInput(val) {
    currentTime = (val / 1000) * loopLength;
    syncSliders(val);
    updateTimeDisplay();
    updateLayers();
}

document.getElementById('timeSlider').addEventListener('input', function() { onSliderInput(this.value); });
document.getElementById('timeSliderPanel').addEventListener('input', function() { onSliderInput(this.value); });

document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
});

// =========================================================================
// Initialize
// =========================================================================
async function init() {
    try {
        const res = await fetch('ais_track_history.json?' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        document.getElementById('loading').querySelector('div:last-child').textContent =
            '處理 ' + data.length + ' 幀資料...';
        await new Promise(r => setTimeout(r, 50));

        processData(data);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('topbar').style.display = '';
        document.getElementById('timelineBar').style.display = '';
        document.getElementById('legend').style.display = '';

        initDeck();

        currentTime = 0;
        updateTimeDisplay();
        togglePlay();

    } catch (e) {
        console.error('Failed to load:', e);
        document.getElementById('loading').innerHTML =
            '<div style="color:#ff3366">載入失敗: ' + e.message + '</div>';
    }
}

init();
</script>
</body>
</html>
