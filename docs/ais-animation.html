        body {
            overflow-y: auto;
        }

        #map {
            height: 500px;
            border-radius: 0 0 6px 6px;
        }

        /* Animation controls */
        .anim-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;

        }

        .anim-btn:hover,

        .anim-btn.play-btn {
            font-size: 16px;
            padding: 5px 16px;

        .day-indicator .date-text {

            border: 1px solid var(--border-glow);
            border-top: none;
            border-radius: 0 0 6px 6px;

    <script>
    // =========================================================================
    // Drill zones & fishing hotspots (same as fetch_ais_data.py)
    // =========================================================================
    const DRILL_ZONES = {
        north: { name: '北區', bounds: [[25.5, 121.0], [26.8, 122.5]], color: 'rgba(255,51,102,0.15)' },
        east:  { name: '東區', bounds: [[23.0, 122.5], [25.5, 125.0]], color: 'rgba(255,107,53,0.15)' },
        south: { name: '南區', bounds: [[21.5, 119.0], [23.0, 121.0]], color: 'rgba(255,215,0,0.15)' },
        west:  { name: '西區', bounds: [[23.5, 118.5], [25.0, 120.0]], color: 'rgba(155,89,182,0.15)' }
    };

    const FISHING_HOTSPOTS = {
        taiwan_bank:   { name: '台灣灘漁場',   bounds: [[22.0, 117.0], [23.5, 119.5]] },
        penghu:        { name: '澎湖漁場',     bounds: [[23.0, 119.0], [24.0, 120.0]] },
        kuroshio_east: { name: '東部黑潮漁場', bounds: [[22.5, 121.0], [24.5, 122.0]] },
        northeast:     { name: '東北漁場',     bounds: [[24.8, 121.5], [25.8, 123.0]] },
        southwest:     { name: '西南沿岸漁場', bounds: [[22.0, 120.0], [23.0, 120.8]] }
    };

    // =========================================================================
    // Animation state
    // =========================================================================
    const Anim = {
        allFrames: [],
        filteredFrames: [],
        currentIdx: 0,
        playing: false,
        speed: 1,
        intervalId: null,
        selectedRange: 14,
        markerLayer: null,
        trailLayer: null,
        showTrails: true,
        chart: null,
        vesselTrails: {}  // mmsi -> [{lat, lon, timestamp}, ...]
    };

    let map;

    // =========================================================================
    // Map initialization
    // =========================================================================
    function initMap() {
        map = L.map('map', {
            center: [24.5, 123.0],
            zoom: 6,
            zoomControl: true,
            attributionControl: false,
            preferCanvas: true
        });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 18,
            opacity: 0.9
        }).addTo(map);

        // Taiwan outline
        const taiwanOutline = [
            [25.3, 121.0], [25.13, 121.5], [24.85, 121.82], [24.5, 121.8],
            [24.0, 121.5], [23.5, 121.3], [23.0, 121.0], [22.5, 120.85],
            [22.0, 120.75], [21.9, 120.85], [22.0, 120.45], [22.3, 120.25],
            [22.6, 120.3], [23.0, 120.1], [23.5, 120.05], [24.0, 120.2],
            [24.5, 120.5], [25.0, 121.0], [25.3, 121.0]
        ];
        L.polygon(taiwanOutline, {
            color: '#4a90d9', weight: 2, opacity: 0.5,
            fillColor: '#1a3a5c', fillOpacity: 0.3
        }).addTo(map);

        // Drill zones
        Object.entries(DRILL_ZONES).forEach(([key, zone]) => {
            const b = zone.bounds;
            L.rectangle([b[0], b[1]], {
                color: '#ff3366', weight: 1.5, opacity: 0.4,
                fillColor: zone.color, fillOpacity: 0.1,
                dashArray: '6,4'
            }).addTo(map).bindTooltip(zone.name, { permanent: false, direction: 'center', className: 'zone-label' });
        });

        // Fishing hotspots
        Object.entries(FISHING_HOTSPOTS).forEach(([key, spot]) => {
            const b = spot.bounds;
            L.rectangle([b[0], b[1]], {
                color: '#00ff88', weight: 1, opacity: 0.3,
                fillColor: 'rgba(0,255,136,0.05)', fillOpacity: 0.05,
                dashArray: '4,4'
            }).addTo(map).bindTooltip(spot.name, { permanent: false, direction: 'center' });
        });

        Anim.markerLayer = L.layerGroup().addTo(map);
        Anim.trailLayer = L.layerGroup().addTo(map);
    }

    // =========================================================================
    // Data loading
    // =========================================================================
    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) {
            overlay.classList.add('hidden');
            setTimeout(() => overlay.style.display = 'none', 300);
        }
    }

    async function loadData() {
        try {
            document.getElementById('loadingDetail').textContent =
                '正在下載 AIS 軌跡資料...';

            const res = await fetch('ais_track_history.json?' + Date.now());
            if (!res.ok) throw new Error('HTTP ' + res.status);

            document.getElementById('loadingDetail').textContent =
                '正在解析資料，請稍候...';
            const data = await res.json();

            if (!Array.isArray(data) || data.length === 0) {
                hideLoading();
                document.getElementById('dataStatus').textContent = i18n.t('ais_anim.no_data');
                document.getElementById('vesselTableBody').innerHTML =
                    '<tr><td colspan="6" class="empty-state">' + i18n.t('ais_anim.no_data_msg') + '</td></tr>';
                return;
            }

            document.getElementById('loadingDetail').textContent =
                '渲染 ' + data.length + ' 幀資料中...';

            Anim.allFrames = data;

            // 用 setTimeout 讓 UI 更新後再渲染（避免阻塞 loading 動畫）
            await new Promise(r => setTimeout(r, 50));
            applyRangeFilter(Anim.selectedRange);

            const first = data[0].timestamp || '';
            const last = data[data.length - 1].timestamp || '';
            document.getElementById('dataStatus').textContent =
                '\u2705 ' + first.slice(0, 10) + ' ~ ' + last.slice(0, 10);
            document.getElementById('updateInfo').textContent =
                i18n.t('common.updated') + ' ' + new Date(last).toLocaleString();

            hideLoading();

        } catch (e) {
            console.error('載入失敗:', e);
            hideLoading();
            document.getElementById('dataStatus').textContent = i18n.t('ais_anim.load_fail');
            document.getElementById('vesselTableBody').innerHTML =
                '<tr><td colspan="6" class="empty-state">' + i18n.t('ais_anim.no_data_msg') + '</td></tr>';
        }
    }

    // =========================================================================
    // Range filtering
    // =========================================================================
    function applyRangeFilter(days) {
        Anim.selectedRange = days;
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - days);
        const cutoffStr = cutoff.toISOString();

        Anim.filteredFrames = Anim.allFrames.filter(f => f.timestamp >= cutoffStr);
        if (Anim.filteredFrames.length === 0) {
            Anim.filteredFrames = Anim.allFrames;
        }

        Anim.currentIdx = 0;
        Anim.vesselTrails = {};
        pause();
        updateSlider();
        updateChart();
        renderFrame(0);
    }

    function setRange(days) {
        document.querySelectorAll('[data-range]').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.range) === days);
        });
        applyRangeFilter(days);
    }

    // =========================================================================
    // Build vessel trails up to current frame
    // =========================================================================
    function buildTrails(upToIdx) {
        Anim.vesselTrails = {};
        for (let i = 0; i <= upToIdx; i++) {
            const frame = Anim.filteredFrames[i];
            if (!frame || !frame.vessels) continue;
            frame.vessels.forEach(v => {
                if (!Anim.vesselTrails[v.mmsi]) {
                    Anim.vesselTrails[v.mmsi] = { points: [], suspicious: v.suspicious, name: v.name };
                }
                Anim.vesselTrails[v.mmsi].points.push([v.lat, v.lon]);
                Anim.vesselTrails[v.mmsi].suspicious = v.suspicious;
            });
        }
    }

    // Compute heading angle (degrees, 0=north, clockwise) from trail history
    function computeHeading(mmsi, currentLat, currentLon) {
        const trail = Anim.vesselTrails && Anim.vesselTrails[mmsi];
        if (trail && trail.points.length >= 2) {
            const pts = trail.points;
            const prev = pts[pts.length - 2];
            const curr = pts[pts.length - 1];
            const dLon = curr[1] - prev[1];
            const dLat = curr[0] - prev[0];
            if (Math.abs(dLon) > 0.0001 || Math.abs(dLat) > 0.0001) {
                const angle = Math.atan2(dLon, dLat) * (180 / Math.PI);
                return (angle + 360) % 360;
            }
        }
        return null; // unknown heading
    }

    // Create triangle SVG icon for vessel marker
    function createVesselIcon(color, isSuspicious, heading) {
        const size = isSuspicious ? 16 : 12;
        const half = size / 2;
        const rotation = heading !== null ? heading : 0;
        const opacity = isSuspicious ? 0.85 : 0.6;

        // If no heading data, show a diamond instead of triangle
        let shape;
        if (heading !== null) {
            // Triangle pointing up (north=0°), rotated by heading
            shape = '<polygon points="' + half + ',1 ' + (size - 1) + ',' + (size - 1) + ' 1,' + (size - 1) + '" ' +
                    'fill="' + color + '" fill-opacity="' + opacity + '" ' +
                    'stroke="' + color + '" stroke-width="' + (isSuspicious ? 1.5 : 0.8) + '" stroke-opacity="0.9"/>';
        } else {
            // Diamond for unknown heading
            shape = '<polygon points="' + half + ',1 ' + (size - 1) + ',' + half + ' ' + half + ',' + (size - 1) + ' 1,' + half + '" ' +
                    'fill="' + color + '" fill-opacity="' + opacity + '" ' +
                    'stroke="' + color + '" stroke-width="' + (isSuspicious ? 1.5 : 0.8) + '" stroke-opacity="0.9"/>';
        }

        const svg = '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" ' +
                    'xmlns="http://www.w3.org/2000/svg" ' +
                    'style="transform:rotate(' + rotation + 'deg)">' +
                    shape + '</svg>';

        return L.divIcon({
            html: svg,
            className: 'vessel-icon',
            iconSize: [size, size],
            iconAnchor: [half, half],
            popupAnchor: [0, -half]
        });
    }

    // =========================================================================
    // Frame rendering
    // =========================================================================
    function renderFrame(idx) {
        if (idx < 0 || idx >= Anim.filteredFrames.length) return;
        Anim.currentIdx = idx;

        const frame = Anim.filteredFrames[idx];
        const vessels = frame.vessels || [];

        // Clear layers
        Anim.markerLayer.clearLayers();
        Anim.trailLayer.clearLayers();

        // Always build trails (needed for heading computation)
        buildTrails(idx);

        // Draw trail lines if enabled
        if (Anim.showTrails) {
            Object.entries(Anim.vesselTrails).forEach(([mmsi, trail]) => {
                if (trail.points.length < 2) return;
                const color = trail.suspicious ? '#ff3366' : '#00f5ff';
                L.polyline(trail.points, {
                    color: color,
                    weight: 1.5,
                    opacity: 0.4,
                    dashArray: '3,3'
                }).addTo(Anim.trailLayer);
            });
        }

        // Plot vessel markers (triangle = heading known, diamond = unknown)
        vessels.forEach(v => {
            const isSuspicious = v.suspicious;
            const color = isSuspicious ? '#ff3366' : '#00f5ff';
            const heading = computeHeading(v.mmsi, v.lat, v.lon);

            // Glow effect FIRST (behind main marker)
            if (isSuspicious) {
                L.circleMarker([v.lat, v.lon], {
                    radius: 10,
                    fillColor: color,
                    color: color,
                    weight: 0,
                    fillOpacity: 0.15,
                    interactive: false
                }).addTo(Anim.markerLayer);
            }

            const icon = createVesselIcon(color, isSuspicious, heading);
            const marker = L.marker([v.lat, v.lon], { icon: icon }).addTo(Anim.markerLayer);

            const headingText = heading !== null ? heading.toFixed(0) + '°' : 'N/A';
            marker.bindPopup(
                '<div style="font-size:14px;line-height:1.8;min-width:180px">' +
                '<b style="color:' + color + ';font-size:15px">' + (v.name || v.mmsi) + '</b><br>' +
                'MMSI: ' + v.mmsi + '<br>' +
                i18n.t('ais_anim.popup_type') + ': ' + v.type_name + '<br>' +
                i18n.t('ais_anim.popup_speed') + ': ' + (v.speed || 0).toFixed(1) + ' kn<br>' +
                '航向: ' + headingText + '<br>' +
                (v.in_drill_zone ? (i18n.t('ais_anim.popup_zone') + ': ' + v.in_drill_zone + '<br>') : '') +
                (isSuspicious ? '<span style="color:#ff3366;font-weight:600;font-size:14px">⚠ SUSPICIOUS</span>' : '') +
                '</div>'
            );
        });

        // Update UI
        updateDayIndicator(frame, idx);
        updateStatCards(frame, idx);
        updateVesselTable(vessels);
        updateSliderPosition(idx);
        highlightChartBar(idx);
    }

    // =========================================================================
    // UI updates
    // =========================================================================
    function updateDayIndicator(frame, idx) {
        const ts = frame.timestamp || '';
        const dateStr = ts.slice(0, 16).replace('T', ' ');
        document.getElementById('dayIndicator').innerHTML =
            '<div class="date-text">' + dateStr + ' UTC</div>' +
            '<div class="frame-text">' + i18n.t('ais_anim.frame', idx + 1, Anim.filteredFrames.length) + '</div>';
    }

    function updateStatCards(frame, idx) {
        const suspicious = frame.suspicious_count || 0;
        const total = frame.vessel_count || 0;
        const drillZone = (frame.vessels || []).filter(v => v.in_drill_zone).length;

        document.getElementById('statSuspicious').textContent = suspicious;
        document.getElementById('statDrillZone').textContent = drillZone;
        document.getElementById('statTotal').textContent = total;

        const changeEl = document.getElementById('statChange');
        if (idx > 0) {
            const prev = Anim.filteredFrames[idx - 1].suspicious_count || 0;
            const diff = suspicious - prev;
            changeEl.textContent = (diff >= 0 ? '+' : '') + diff;
            changeEl.className = 'value ' + (diff > 0 ? 'alert' : diff < 0 ? 'trend-down' : '');
        } else {
            changeEl.textContent = '--';
            changeEl.className = 'value';
        }
    }

    function updateVesselTable(vessels) {
        const tbody = document.getElementById('vesselTableBody');
        if (!vessels || vessels.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state">' + i18n.t('ais_anim.no_data_msg') + '</td></tr>';
            return;
        }

        // Sort: suspicious first, then by speed descending
        const sorted = [...vessels].sort((a, b) => {
            if (a.suspicious !== b.suspicious) return b.suspicious ? 1 : -1;
            return (b.speed || 0) - (a.speed || 0);
        });

        const rows = sorted.slice(0, 30).map(v => {
            const isSusp = v.suspicious;
            return '<tr>' +
                '<td>' + v.mmsi + '</td>' +
                '<td>' + (v.name || '--') + '</td>' +
                '<td>' + (v.type_name || '--') + '</td>' +
                '<td>' + (v.speed || 0).toFixed(1) + ' kn</td>' +
                '<td class="zone-tag">' + (v.in_drill_zone || '--') + '</td>' +
                '<td>' + (isSusp ? '<span class="suspicious-tag">⚠ SUSPICIOUS</span>' : 'OK') + '</td>' +
                '</tr>';
        });

        tbody.innerHTML = rows.join('');
        if (sorted.length > 30) {
            tbody.innerHTML += '<tr><td colspan="6" style="text-align:center;color:var(--text-secondary);font-size:9px">... ' + (sorted.length - 30) + ' more vessels</td></tr>';
        }
    }

    // =========================================================================
    // Slider
    // =========================================================================
    function updateSlider() {
        const slider = document.getElementById('daySlider');
        slider.min = 0;
        slider.max = Math.max(0, Anim.filteredFrames.length - 1);
        slider.value = 0;

        const labels = document.getElementById('timelineLabels');
        const frames = Anim.filteredFrames;
        if (frames.length <= 1) {
            labels.innerHTML = frames.length === 1 ? '<span>' + (frames[0].timestamp || '').slice(5, 16) + '</span>' : '';
            return;
        }

        const step = Math.max(1, Math.floor(frames.length / 6));
        const labelHtml = [];
        for (let i = 0; i < frames.length; i++) {
            if (i === 0 || i === frames.length - 1 || i % step === 0) {
                labelHtml.push('<span>' + (frames[i].timestamp || '').slice(5, 16).replace('T', ' ') + '</span>');
            }
        }
        labels.innerHTML = labelHtml.join('');
    }

    function updateSliderPosition(idx) {
        document.getElementById('daySlider').value = idx;
    }

    document.getElementById('daySlider').addEventListener('input', function () {
        pause();
        renderFrame(parseInt(this.value));
    });

    // =========================================================================
    // Chart
    // =========================================================================
    function updateChart() {
        const ctx = document.getElementById('dailyChart').getContext('2d');
        if (Anim.chart) Anim.chart.destroy();

        const labels = Anim.filteredFrames.map(f => (f.timestamp || '').slice(5, 16).replace('T', ' '));
        const data = Anim.filteredFrames.map(f => f.suspicious_count || 0);

        Anim.chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: i18n.t('ais_anim.suspicious'),
                    data: data,
                    backgroundColor: data.map((_, i) =>
                        i === Anim.currentIdx ? 'rgba(0, 245, 255, 0.8)' : 'rgba(255, 51, 102, 0.5)'
                    ),
                    borderColor: data.map((_, i) =>
                        i === Anim.currentIdx ? '#00f5ff' : '#ff3366'
                    ),
                    borderWidth: 1,
                    borderRadius: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        ticks: { color: '#8aa4c8', font: { size: 7, family: 'JetBrains Mono' }, maxRotation: 45 },
                        grid: { color: 'rgba(0,245,255,0.05)' }
                    },
                    y: {
                        ticks: { color: '#8aa4c8', font: { size: 9, family: 'JetBrains Mono' } },
                        grid: { color: 'rgba(0,245,255,0.05)' }
                    }
                }
            }
        });
    }

    function highlightChartBar(idx) {
        if (!Anim.chart) return;
        const dataset = Anim.chart.data.datasets[0];
        dataset.backgroundColor = dataset.data.map((_, i) =>
            i === idx ? 'rgba(0, 245, 255, 0.8)' : 'rgba(255, 51, 102, 0.5)'
        );
        dataset.borderColor = dataset.data.map((_, i) =>
            i === idx ? '#00f5ff' : '#ff3366'
        );
        Anim.chart.update('none');
    }

    // =========================================================================
    // Playback controls
    // =========================================================================
    function play() {
        if (Anim.playing) return;
        if (Anim.filteredFrames.length === 0) return;
        if (Anim.currentIdx >= Anim.filteredFrames.length - 1) {
            Anim.currentIdx = -1;
        }

        Anim.playing = true;
        const btn = document.getElementById('playBtn');
        btn.classList.add('playing');
        btn.textContent = '\u23F8';

        const baseInterval = 1500;
        const interval = baseInterval / Anim.speed;

        Anim.intervalId = setInterval(() => {
            const nextIdx = Anim.currentIdx + 1;
            if (nextIdx >= Anim.filteredFrames.length) {
                pause();
                return;
            }
            renderFrame(nextIdx);
        }, interval);
    }

    function pause() {
        Anim.playing = false;
        clearInterval(Anim.intervalId);
        const btn = document.getElementById('playBtn');
        btn.classList.remove('playing');
        btn.textContent = '\u25B6';
    }

    function togglePlay() {
        Anim.playing ? pause() : play();
    }

    function stepForward() {
        pause();
        renderFrame(Math.min(Anim.currentIdx + 1, Anim.filteredFrames.length - 1));
    }

    function stepBackward() {
        pause();
        renderFrame(Math.max(Anim.currentIdx - 1, 0));
    }

    function setSpeed(speed) {
        Anim.speed = speed;
        document.querySelectorAll('[data-speed]').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.speed) === speed);
        });
        if (Anim.playing) {
            pause();
            play();
        }
    }

    function toggleTrails() {
        Anim.showTrails = document.getElementById('showTrails').checked;
        renderFrame(Anim.currentIdx);
    }

    // =========================================================================
    // Keyboard shortcuts
    // =========================================================================
    document.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT') return;
        switch (e.key) {
            case ' ':
                e.preventDefault();
                togglePlay();
                break;
            case 'ArrowRight':
                stepForward();
                break;
            case 'ArrowLeft':
                stepBackward();
                break;
        }
    });

    // =========================================================================
    // Mobile bottom nav
    // =========================================================================
    function setupMobileNav() {
        if (document.querySelector('.mobile-bottom-nav')) return;
        const nav = document.createElement('nav');
        nav.className = 'mobile-bottom-nav';
        nav.innerHTML = `
            <a href="index.html">
                <span class="nav-icon">🛰️</span>
                <span data-i18n="nav.mob_monitor">監測</span>
            </a>
            <a href="dark-vessels.html">
                <span class="nav-icon">🔦</span>
                <span data-i18n="nav.mob_dark">暗船</span>
            </a>
            <a href="weekly-animation.html">
                <span class="nav-icon">🎬</span>
                <span data-i18n="nav.mob_anim">動畫</span>
            </a>
            <a href="ais-animation.html" class="active">
                <span class="nav-icon">🚢</span>
                <span data-i18n="nav.mob_ais_anim">船位</span>
            </a>
        `;
        i18n.applyAll();
        document.body.appendChild(nav);
    }

    // =========================================================================
    // Initialize
    // =========================================================================
    initMap();
    setupMobileNav();
    loadData();
    </script>
</body>
