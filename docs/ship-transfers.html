    <script>
        let map;
        let allTransfers = [];
        let markers = [];
        let trackLayer;
        let cachedTrackHistory = null;

        const CLASS_COLORS = {
            suspicious: '#ff3366',
            normal: '#ffd700',
            pair_trawling: '#00ff88'
        };

        const CLASS_LABELS = {
            suspicious: { zh: '可疑旁靠', en: 'Suspicious' },
            normal: { zh: '一般旁靠', en: 'Normal' },
            pair_trawling: { zh: '雙拖作業', en: 'Pair Trawling' }
        };

        const VESSEL_TYPE_COLORS = {
            fishing: '#00ff88', cargo: '#00f5ff', tanker: '#ff6b35',
            lng: '#f0e130', other: '#ff3366', unknown: '#888888'
        };

        let hiddenVesselTypes = new Set();

        function normalizeVesselType(typeName) {
            if (!typeName) return 'unknown';
            const t = typeName.toLowerCase();
            if (t === 'fishing') return 'fishing';
            if (t === 'cargo') return 'cargo';
            if (t === 'tanker') return 'tanker';
            if (t === 'lng' || t.includes('gas') || t.includes('lpg')) return 'lng';
            if (t === 'unknown' || t === '') return 'unknown';
            return 'other';
        }

        function isTransferHiddenByType(t) {
            if (hiddenVesselTypes.size === 0) return false;
            const t1 = normalizeVesselType(t.vessel1.type_name);
            const t2 = normalizeVesselType(t.vessel2.type_name);
            return hiddenVesselTypes.has(t1) && hiddenVesselTypes.has(t2);
        }

        function initMap() {
            map = L.map('map', {
                center: [24.0, 121.0],
                zoom: 6,
                zoomControl: true,
                attributionControl: false
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 18,
                opacity: 0.9
            }).addTo(map);

            trackLayer = L.layerGroup().addTo(map);
        }

        function plotTransfers(transfers) {
            // Clear existing markers
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            transfers.forEach(t => {
                const loc = t.location;
                if (!loc || !loc.lat || !loc.lon) return;

                const color = CLASS_COLORS[t.classification] || '#ffd700';
                const lang = (typeof i18n !== 'undefined' && i18n.lang === 'en') ? 'en' : 'zh';
                const classLabel = CLASS_LABELS[t.classification] ? CLASS_LABELS[t.classification][lang] : t.classification;

                // Main marker
                const marker = L.circleMarker([loc.lat, loc.lon], {
                    radius: t.classification === 'suspicious' ? 7 : 5,
                    fillColor: color,
                    color: color,
                    weight: 2,
                    opacity: 0.9,
                    fillOpacity: 0.5
                }).addTo(map);

                // Draw line between vessel pair
                if (t.vessel1.lat && t.vessel1.lon && t.vessel2.lat && t.vessel2.lon) {
                    const line = L.polyline(
                        [[t.vessel1.lat, t.vessel1.lon], [t.vessel2.lat, t.vessel2.lon]],
                        { color: color, weight: 2, opacity: 0.6, dashArray: '4,4' }
                    ).addTo(map);
                    markers.push(line);
                }

                const v1name = t.vessel1.name || t.vessel1.mmsi;
                const v2name = t.vessel2.name || t.vessel2.mmsi;
                const v1mmsi = t.vessel1.mmsi;
                const v2mmsi = t.vessel2.mmsi;
                marker.bindPopup(`
                    <b style="color:${color}">${classLabel}</b>
                    <span class="badge badge-${t.classification}" style="margin-left:4px">${t.risk_score}</span><br>
                    🚢 ${v1name} <span style="color:#888">(${t.vessel1.type_name})</span><br>
                    🚢 ${v2name} <span style="color:#888">(${t.vessel2.type_name})</span><br>
                    📏 ${t.min_distance_m.toFixed(0)}m &nbsp; ⏱ ${t.duration_hours}h<br>
                    📍 ${loc.lat.toFixed(3)}, ${loc.lon.toFixed(3)}<br>
                    🕐 ${t.first_seen ? new Date(t.first_seen).toLocaleString() : '--'}
                    ${t.risk_factors && t.risk_factors.length ? '<br>⚠️ ' + t.risk_factors.join(', ') : ''}
                    <br><button class="track-btn" onclick="loadTrack('${v1mmsi}','${v1name.replace(/'/g, "\\'")}')">📡 ${v1name} 航跡</button>
                    <button class="track-btn" onclick="loadTrack('${v2mmsi}','${v2name.replace(/'/g, "\\'")}')">📡 ${v2name} 航跡</button>
                `);
                markers.push(marker);
            });
        }

        function renderTable(transfers) {
            const tbody = document.getElementById('transferTableBody');
            const lang = (typeof i18n !== 'undefined' && i18n.lang === 'en') ? 'en' : 'zh';

            if (!transfers.length) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-state">${i18n.t('common.no_data')}</td></tr>`;
                return;
            }

            tbody.innerHTML = transfers.map(t => {
                const classLabel = CLASS_LABELS[t.classification] ? CLASS_LABELS[t.classification][lang] : t.classification;
                const time = t.first_seen ? new Date(t.first_seen).toLocaleString() : '--';
                return `
                <tr>
                    <td><span class="badge badge-${t.classification}">${classLabel}</span></td>
                    <td>
                        <div class="vessel-pair">
                            <span><span class="vessel-name">${t.vessel1.name || t.vessel1.mmsi}</span> <span class="vessel-type">${t.vessel1.type_name}</span></span>
                            <span><span class="vessel-name">${t.vessel2.name || t.vessel2.mmsi}</span> <span class="vessel-type">${t.vessel2.type_name}</span></span>
                        </div>
                    </td>
                    <td style="font-family:'JetBrains Mono',monospace">${t.min_distance_m.toFixed(0)}m</td>
                    <td style="font-family:'JetBrains Mono',monospace">${t.duration_hours}h</td>
                    <td style="font-family:'JetBrains Mono',monospace;color:${CLASS_COLORS[t.classification]}">${t.risk_score}</td>
                    <td style="font-size:10px">${time}</td>
                </tr>`;
            }).join('');
        }

        function renderDailyChart(transfers) {
            const byDate = {};
            transfers.forEach(t => {
                const date = t.first_seen ? t.first_seen.substring(0, 10) : null;
                if (!date) return;
                if (!byDate[date]) byDate[date] = { suspicious: 0, normal: 0, pair_trawling: 0 };
                byDate[date][t.classification] = (byDate[date][t.classification] || 0) + 1;
            });

            const dates = Object.keys(byDate).sort();
            if (!dates.length) return;

            const ctx = document.getElementById('dailyChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: i18n.t('sts.suspicious'),
                            data: dates.map(d => byDate[d].suspicious || 0),
                            backgroundColor: 'rgba(255,51,102,0.7)',
                            stack: 'stack0'
                        },
                        {
                            label: i18n.t('sts.normal_label'),
                            data: dates.map(d => byDate[d].normal || 0),
                            backgroundColor: 'rgba(255,215,0,0.7)',
                            stack: 'stack0'
                        },
                        {
                            label: i18n.t('sts.pair_trawling'),
                            data: dates.map(d => byDate[d].pair_trawling || 0),
                            backgroundColor: 'rgba(0,255,136,0.7)',
                            stack: 'stack0'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#8aa4c8', font: { size: 10 } } }
                    },
                    scales: {
                        x: {
                            stacked: true,
                            ticks: { color: '#8aa4c8', font: { size: 9 }, maxRotation: 45 },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            stacked: true,
                            ticks: { color: '#8aa4c8', font: { size: 10 }, stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }

        function applyFilter(filter) {
            if (filter === undefined) {
                // Re-apply current active classification filter
                const activeBtn = document.querySelector('#filterTabs button.active');
                filter = activeBtn ? activeBtn.dataset.filter : 'all';
            }
            let filtered = filter === 'all' ? allTransfers : allTransfers.filter(t => t.classification === filter);
            // Apply vessel type exclusion
            if (hiddenVesselTypes.size > 0) {
                filtered = filtered.filter(t => !isTransferHiddenByType(t));
            }
            plotTransfers(filtered);
            renderTable(filtered);
            updateLegendCounts(filtered);
        }

        function updateLegendCounts(transfers) {
            const counts = { fishing: 0, cargo: 0, tanker: 0, lng: 0, other: 0, unknown: 0 };
            transfers.forEach(t => {
                counts[normalizeVesselType(t.vessel1.type_name)]++;
                counts[normalizeVesselType(t.vessel2.type_name)]++;
            });
            Object.keys(counts).forEach(type => {
                const el = document.querySelector(`[data-type-count="${type}"]`);
                if (el) el.textContent = counts[type] || '';
            });
        }

        async function loadTrack(mmsi, label) {
            trackLayer.clearLayers();
            const infoBar = document.getElementById('trackInfoBar');
            const infoText = document.getElementById('trackInfoText');
            infoBar.style.display = 'flex';
            infoText.textContent = `載入 ${label} 航跡...`;

            try {
                let data = null;

                // Try pre-generated route file
                const res = await fetch('vessel_routes/' + mmsi + '.json?' + Date.now());
                if (res.ok) {
                    data = await res.json();
                    if (!data.track || data.track.length === 0) data = null;
                }

                // Fallback: extract from ais_track_history.json
                if (!data) {
                    if (!cachedTrackHistory) {
                        const hres = await fetch('ais_track_history.json?' + Date.now());
                        if (hres.ok) cachedTrackHistory = await hres.json();
                    }
                    if (Array.isArray(cachedTrackHistory)) {
                        const track = [];
                        let vName = '', vType = '';
                        for (const snap of cachedTrackHistory) {
                            for (const v of (snap.vessels || [])) {
                                if (String(v.mmsi) === String(mmsi)) {
                                    if (!vName && v.name) vName = v.name;
                                    if (!vType && v.type_name) vType = v.type_name;
                                    track.push({ t: snap.timestamp, lat: v.lat, lon: v.lon });
                                }
                            }
                        }
                        if (track.length >= 2) {
                            track.sort((a, b) => new Date(a.t) - new Date(b.t));
                            const deduped = [track[0]];
                            for (let k = 1; k < track.length; k++) {
                                if (track[k].lat !== deduped[deduped.length - 1].lat ||
                                    track[k].lon !== deduped[deduped.length - 1].lon) {
                                    deduped.push(track[k]);
                                } else if (k === track.length - 1) {
                                    deduped.push(track[k]);
                                }
                            }
                            if (deduped.length >= 2) {
                                data = { mmsi, name: vName || label, type: vType, track: deduped };
                            }
                        }
                    }
                }

                if (!data || !data.track || data.track.length < 2) {
                    infoText.textContent = `無航跡資料 (MMSI ${mmsi})`;
                    setTimeout(() => { infoBar.style.display = 'none'; }, 3000);
                    return;
                }

                // Render track
                const points = data.track.map(p => [p.lat, p.lon]);
                L.polyline(points, {
                    color: '#ffd700', weight: 2.5, opacity: 0.7, dashArray: '6,4'
                }).addTo(trackLayer).bindTooltip(data.name + ' 歷史航跡', { sticky: true });

                // Start marker (green)
                const first = data.track[0];
                L.circleMarker([first.lat, first.lon], {
                    radius: 5, fillColor: '#00ff88', color: '#fff', weight: 1.5, fillOpacity: 0.9
                }).addTo(trackLayer).bindTooltip('起點 ' + new Date(first.t).toLocaleDateString());

                // End marker (red)
                const last = data.track[data.track.length - 1];
                L.circleMarker([last.lat, last.lon], {
                    radius: 5, fillColor: '#ff3366', color: '#fff', weight: 1.5, fillOpacity: 0.9
                }).addTo(trackLayer).bindTooltip('終點 ' + new Date(last.t).toLocaleDateString());

                // Intermediate markers (~1/day)
                data.track.forEach((p, i) => {
                    if (i > 0 && i < data.track.length - 1 && i % 12 === 0) {
                        L.circleMarker([p.lat, p.lon], {
                            radius: 3, fillColor: '#ffd700', color: '#ffd700', weight: 1, fillOpacity: 0.6
                        }).addTo(trackLayer).bindTooltip(new Date(p.t).toLocaleDateString());
                    }
                });

                map.fitBounds(L.polyline(points).getBounds().pad(0.2));
                infoText.textContent = `${data.name} (MMSI ${mmsi}) — ${data.track.length} 點`;

            } catch (e) {
                console.error('Track load failed:', e);
                infoText.textContent = '航跡載入失敗';
                setTimeout(() => { infoBar.style.display = 'none'; }, 3000);
            }
        }

        function clearTrack() {
            trackLayer.clearLayers();
            document.getElementById('trackInfoBar').style.display = 'none';
        }

        // Filter tab handlers
        document.getElementById('filterTabs').addEventListener('click', e => {
            const btn = e.target.closest('button');
            if (!btn) return;
            document.querySelectorAll('#filterTabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilter(btn.dataset.filter);
        });

        // Vessel type legend click handler
        document.getElementById('vesselTypeLegend').addEventListener('click', e => {
            const item = e.target.closest('.legend-item');
            if (!item) return;
            const type = item.dataset.vesselType;
            if (!type) return;
            if (hiddenVesselTypes.has(type)) {
                hiddenVesselTypes.delete(type);
                item.classList.remove('disabled');
            } else {
                hiddenVesselTypes.add(type);
                item.classList.add('disabled');
            }
            applyFilter(); // re-apply current filter with updated type exclusions
        });

        async function loadData() {
            try {
                const res = await fetch('ship_transfers.json?' + Date.now());
                if (!res.ok) {
                    document.getElementById('dataStatus').textContent = i18n.t('sts.no_data');
                    document.getElementById('transferTableBody').innerHTML =
                        `<tr><td colspan="6" class="empty-state">${i18n.t('sts.no_data')}</td></tr>`;
                    return;
                }
                const data = await res.json();
                const summary = data.summary || {};

                // Stats
                document.getElementById('statActive').textContent = (summary.active_count || 0).toLocaleString();
                document.getElementById('statSuspicious').textContent = (summary.suspicious_count || 0).toLocaleString();
                document.getElementById('statTrawling').textContent = (summary.pair_trawling_count || 0).toLocaleString();
                document.getElementById('statVessels').textContent = (summary.unique_vessels || 0).toLocaleString();

                // Merge active + history for display
                allTransfers = [
                    ...(data.active_transfers || []),
                    ...(data.history || [])
                ];

                plotTransfers(allTransfers);
                renderTable(allTransfers);
                renderDailyChart(allTransfers);
                updateLegendCounts(allTransfers);

                // Status
                document.getElementById('dataStatus').textContent =
                    `✅ ${allTransfers.length} ` + i18n.t('sts.events_found');
                document.getElementById('updateInfo').textContent =
                    i18n.t('common.updated') + ' ' + new Date(data.updated_at).toLocaleString();

            } catch (e) {
                console.error('Load failed:', e);
                document.getElementById('dataStatus').textContent = i18n.t('common.error_load');
            }
        }

        // Initialize
        initMap();
        loadData();
    </script>
    <script src="js/mobile-nav.js"></script>
</body>
